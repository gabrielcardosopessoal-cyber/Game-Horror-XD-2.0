<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NÃO DEIXE ELE TE PEGAR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #gameCanvas { display: block; filter: contrast(1.2) brightness(0.8); }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #ff0000; 
            font-size: 18px; text-transform: uppercase; letter-spacing: 2px;
            z-index: 10; pointer-events: none;
        }
        #jumpscare {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; z-index: 999;
        }
        #jumpscare img { width: 100%; height: 100%; object-fit: cover; animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div id="ui">Colete as 6 chaves para abrir o portal!</div>
    <div id="jumpscare"><img src="monstro.jpg" alt="MORTE"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const jumpscareDiv = document.getElementById('jumpscare');

        // --- SISTEMA DE ÁUDIO ---
        const somSusto = new Audio('grito.mp3');
        const musicaFundo = new Audio('musica_fundo.mp3');
        const somChave = new Audio('chave.mp3');
        const musicaVitoria = new Audio('vitoria.mp3'); 
        
        musicaFundo.loop = true;
        musicaFundo.volume = 0.4;
        musicaVitoria.volume = 0.6;

        let audioContextIniciado = false;
        async function iniciarAudio() {
            if (!audioContextIniciado) {
                musicaFundo.play().catch(() => {});
                audioContextIniciado = true;
            }
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameOver = false;
        let vitoria = false;
        let touchActive = false;
        let touchTarget = { x: 0, y: 0 };
        let chavesColetadas = 0;

        const player = { x: 50, y: 50, size: 16, speed: 6, color: '#ffffff' };
        
        const monster = {
            x: canvas.width - 200,
            y: canvas.height - 200,
            width: 80, 
            height: 100,
            speed: 3.8, 
            img: new Image()
        };
        monster.img.src = 'monstro.jpg';

        const finishLine = { x: canvas.width - 100, y: canvas.height - 100, size: 70 };

        const wallT = 18; 
        const walls = [
            { x: 250, y: 0, w: wallT, h: 400 },
            { x: 500, y: 200, w: wallT, h: 500 },
            { x: 750, y: 0, w: wallT, h: 350 },
            { x: 1000, y: 300, w: wallT, h: 500 },
            { x: 0, y: 500, w: 300, h: wallT },
            { x: 600, y: 150, w: 250, h: wallT },
            { x: 850, y: 550, w: 300, h: wallT },
            { x: 150, y: 250, w: 100, h: wallT }
        ];

        const keysObj = [
            { x: 350, y: 80, coletada: false },
            { x: 100, y: canvas.height - 100, coletada: false },
            { x: 850, y: 100, coletada: false },
            { x: canvas.width - 150, y: 80, coletada: false },
            { x: 550, y: 450, coletada: false },
            { x: canvas.width - 50, y: canvas.height - 300, coletada: false }
        ];

        const inputKeys = {};
        window.addEventListener('keydown', e => { 
            inputKeys[e.code] = true; 
            iniciarAudio(); 
        });
        window.addEventListener('keyup', e => inputKeys[e.code] = false);

        canvas.addEventListener('touchstart', e => {
            touchActive = true;
            iniciarAudio();
            updateTouch(e);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => updateTouch(e), { passive: false });
        canvas.addEventListener('touchend', () => touchActive = false);

        function updateTouch(e) {
            e.preventDefault();
            touchTarget.x = e.touches[0].clientX;
            touchTarget.y = e.touches[0].clientY;
        }

        function checkWall(nx, ny, w_obj, h_obj) {
            return walls.some(w => 
                nx < w.x + w.w && nx + w_obj > w.x &&
                ny < w.y + w.h && ny + h_obj > w.y
            );
        }

        function triggerJumpscare() {
            if (gameOver || vitoria) return;
            gameOver = true;
            musicaFundo.pause();
            somSusto.currentTime = 0;
            somSusto.play();
            jumpscareDiv.style.display = 'block';
            setTimeout(() => { location.reload(); }, 2500);
        }

        function update() {
            if (gameOver || vitoria) return;
            let moveX = 0, moveY = 0;
            
            if (inputKeys['ArrowUp'] || inputKeys['KeyW']) moveY -= player.speed;
            if (inputKeys['ArrowDown'] || inputKeys['KeyS']) moveY += player.speed;
            if (inputKeys['ArrowLeft'] || inputKeys['KeyA']) moveX -= player.speed;
            if (inputKeys['ArrowRight'] || inputKeys['KeyD']) moveX += player.speed;

            if (touchActive) {
                const dx = touchTarget.x - player.x;
                const dy = touchTarget.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 10) {
                    moveX = (dx / dist) * player.speed;
                    moveY = (dy / dist) * player.speed;
                }
            }

            if (!checkWall(player.x + moveX - player.size, player.y - player.size, player.size*2, player.size*2)) player.x += moveX;
            if (!checkWall(player.x - player.size, player.y + moveY - player.size, player.size*2, player.size*2)) player.y += moveY;

            keysObj.forEach(k => {
                if (!k.coletada) {
                    const distK = Math.sqrt((player.x - k.x)**2 + (player.y - k.y)**2);
                    if (distK < 30) {
                        k.coletada = true;
                        chavesColetadas++;
                        somChave.currentTime = 0;
                        somChave.play().catch(() => {});
                    }
                }
            });

            const mdx = player.x - (monster.x + monster.width/2);
            const mdy = player.y - (monster.y + monster.height/2);
            const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
            
            let mMoveX = (mdx / mdist) * monster.speed;
            let mMoveY = (mdy / mdist) * monster.speed;

            if (!checkWall(monster.x + mMoveX, monster.y, monster.width, monster.height)) monster.x += mMoveX;
            if (!checkWall(monster.x, monster.y + mMoveY, monster.width, monster.height)) monster.y += mMoveY;

            if (player.x + player.size > monster.x + 15 && player.x - player.size < monster.x + monster.width - 15 &&
                player.y + player.size > monster.y + 15 && player.y - player.size < monster.y + monster.height - 15) {
                triggerJumpscare();
            }

            if (chavesColetadas === 6) {
                document.getElementById('ui').innerText = "PORTAL LIBERADO! CORRA!";
                document.getElementById('ui').style.color = "#00ff00";
                if (player.x > finishLine.x && player.x < finishLine.x + finishLine.size &&
                    player.y > finishLine.y && player.y < finishLine.y + finishLine.size) {
                    vitoria = true;
                    musicaFundo.pause();
                    musicaVitoria.play().catch(() => {});
                    alert("VOCÊ SOBREVIVEU!");
                    setTimeout(() => { location.reload(); }, 4000);
                }
            } else {
                document.getElementById('ui').innerText = `CHAVES: ${chavesColetadas} / 6`;
            }
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = chavesColetadas === 6 ? '#00ff00' : '#333';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.roundRect(finishLine.x, finishLine.y, finishLine.size, finishLine.size, 10);
            ctx.stroke();
            
            ctx.fillStyle = '#1a1a1a';
            walls.forEach(w => {
                ctx.beginPath();
                ctx.roundRect(w.x, w.y, w.w, w.h, 8);
                ctx.fill();
            });
            
            keysObj.forEach(k => {
                if (!k.coletada) {
                    ctx.fillStyle = 'gold';
                    ctx.beginPath();
                    ctx.arc(k.x, k.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "gold";
                }
            });
            ctx.shadowBlur = 0;

            const gradient = ctx.createRadialGradient(player.x, player.y, 5, player.x, player.y, 280);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.95)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.drawImage(monster.img, monster.x, monster.y, monster.width, monster.height);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        monster.img.onload = () => { gameLoop(); };
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
